<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Weather Updates</title>
    <meta
      name="description"
      content="Get real-time weather updates for your location with our online weather service."
    />

    <meta
      name="keywords"
      content="weather updates, online weather, weather forecast"
    />

    <link rel="canonical" href="https://example.com/online-weather-updates" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" href="image/logo.png" />
    <link href="image/logo.png" rel="apple-touch-icon" />

    <meta name="author" content="Jayesh Jain" />

    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Online Weather Updates" />
    <meta
      property="og:description"
      content="Get real-time weather updates for your location with our online weather service."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://online-weather-updates.netlify.app/"
    />
    <meta
      property="og:image"
      content="https://online-weather-updates.netlify.app/image/image.png"
    />
    <meta property="og:image:alt" content="Online Weather Updates Logo" />
    <meta property="og:site_name" content="Online Weather Updates" />
  </head>
  <body>
    <div class="container">
      <div class="search-box">
        <i class="bx bx-map"></i>
        <input type="text" placeholder="enter your location" />
        <button class="bx bx-search-alt"></button>
      </div>
      <p class="city-hide">city hide</p>
      <div class="weather-box">
        <div class="box">
          <div class="info-weather">
            <div class="weather">
              <img src="image/cloud.png" />
              <p class="temperature">0<span>°C</span></p>
              <p class="description">Broken cloud</p>
            </div>
          </div>
        </div>
      </div>

      <div class="weather-details">
        <div class="humidity">
          <i class="bx bx-water"></i>
          <div class="text">
            <div class="info-humidity">
              <span>0%</span>
            </div>
            <p>Humidity</p>
          </div>
        </div>

        <div class="wind">
          <i class="bx bx-wind"></i>
          <div class="text">
            <div class="info-wind">
              <span>0Km/h</span>
            </div>
            <p>Wind</p>
          </div>
        </div>
      </div>

      <div class="not-found">
        <div class="box">
          <img src="image/404.png" />
          <p>Oops! Location not found</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
